<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CowMilk's Server Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="discord-app" id="appContainer">
        
        <!-- Background Dark Mask Layer for Closing Side Drawers -->
        <div class="mobile-overlay" id="menuOverlay"></div>

        <!-- COLUMN 1: Far Left Server Sidebar -->
        <div class="servers-sidebar">
            <div class="server-icon home-icon">🤖</div>
            <div class="separator"></div>
            <div class="server-icon active">🥛</div>
            <div class="server-icon">+</div>
        </div>

        <!-- COLUMN 2: Channels Sidebar -->
        <div class="channels-sidebar">
            <div class="server-header">
                <h2>CowMilk's server</h2>
                <span class="dropdown-arrow">▼</span>
            </div>
            
            <div class="channel-list">
                <div class="category">INFORMATION</div>
                <div class="channel active"># welcome-and-rules</div>
                <div class="channel"># announcements</div>
                <div class="channel"># resources</div>
                
                <div class="category">TEXT CHANNELS</div>
                <div class="channel"># memes</div>
                <div class="channel"># general-chat</div>
                <div class="channel"># ai-bot-test</div>
            </div>

            <div class="user-profile-bar">
                <div class="user-info">
                    <div class="profile-avatar"></div>
                    <div>
                        <div class="username">Cowmilk</div>
                        <div class="user-status">🎮 ROBLOX</div>
                    </div>
                </div>
                <div class="profile-controls">🎤 🎧 ⚙️</div>
            </div>
        </div>

        <!-- MAIN WINDOW CONTAINER -->
        <div class="main-window">
            
            <header class="channel-header">
                <div class="header-left">
                    <button class="mobile-menu-btn" id="menuToggleBtn">☰</button>
                    <span class="hashtag">#</span> <span id="headerChannelName">welcome-and-rules</span>
                </div>
                <div class="header-right">
                     👥 <input type="text" placeholder="Search" class="search-bar" style="max-width: 90px; font-size:12px;">
                </div>
            </header>

            <div class="inner-content">
                
                <div class="chat-area">
                    <div class="chat-messages">
                        <!-- Messages dynamically load here from Firebase -->
                    </div>

                    <div class="chat-input-container">
                        <div class="chat-input-wrapper">
                            <button class="attach-btn">+</button>
                            <input type="text" id="messageInputField" placeholder="Message #welcome-and-rules">
                            <div class="input-icons">😀</div>
                        </div>
                    </div>
                </div>

                <!-- COLUMN 3: Member List Sidebar -->
                <div class="members-sidebar">
                    <div class="member-group-title">ONLINE — 1</div>
                    <div class="member-card">
                        <div class="member-avatar"></div>
                        <div>
                            <div class="member-name">Cowmilk 👑</div>
                            <div class="member-game">🎮 ROBLOX</div>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- Firebase App and Realtime Database scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <!-- Your custom app script -->
    <script src="script.js"></script>
</body>
</html>
