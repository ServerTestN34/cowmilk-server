<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CowMilk's Server Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="identity-modal" id="identityModal">
        <div class="modal-card">
            <h2>Setup Your Profile</h2>
            <p>Choose your display identity & user credentials:</p>
            
            <div class="profile-input-group">
                <label>Display Username:</label>
                <input type="text" id="modalUsernameInput" value="Cowmilk">
            </div>

            <div class="profile-input-group">
                <label>PIN (locks your name so no one else can use it):</label>
                <input type="password" id="modalPinInput" placeholder="4+ digits or characters" inputmode="numeric">
            </div>

            <div class="profile-input-group">
                <label>Avatar Picture URL:</label>
                <input type="text" id="modalAvatarInput" placeholder="Paste image address (or leave blank)">
            </div>

            <div class="profile-input-group">
                <label>Playing Status:</label>
                <input type="text" id="modalStatusInput" value="🎮 ROBLOX">
            </div>

            <button class="join-server-btn" id="confirmProfileBtn">Join Server</button>
        </div>
    </div>

    <div class="identity-modal" id="forwardModal" style="display: none;">
        <div class="modal-card">
            <h2>Forward Message</h2>
            <p>Select target destination text channel:</p>
            <div class="profile-options" id="forwardChannelListContainer"></div>
            <button class="join-server-btn cancel-btn" id="closeForwardModalBtn" style="background-color: #4e5058; margin-top: 12px;">Cancel</button>
        </div>
    </div>

    <div class="identity-modal" id="adminPanelModal" style="display: none;">
        <div class="modal-card admin-modal-card">
            <h2>🛡️ Admin Panel</h2>
            <p>Server moderation tools</p>

            <div class="admin-section">
                <label>Purge Messages (current channel)</label>
                <div class="admin-inline-row">
                    <input type="number" id="adminPurgeAmount" min="1" value="10" placeholder="Amount">
                    <button class="join-server-btn admin-inline-btn" id="adminPurgeBtn">Purge</button>
                </div>
            </div>

            <div class="admin-section">
                <label>Muted Users</label>
                <div id="adminMutedList" class="admin-list"></div>
            </div>

            <div class="admin-section">
                <label>Delete a Channel</label>
                <div id="adminChannelDeleteList" class="admin-list"></div>
            </div>

            <button class="join-server-btn cancel-btn" id="closeAdminPanelBtn" style="background-color: #4e5058; margin-top: 4px;">Close</button>
        </div>
    </div>

    <div class="discord-app" id="appContainer">
        <div class="mobile-overlay" id="menuOverlay"></div>

        <div class="servers-sidebar">
            <div class="server-pill-container">
                <div class="pill-line"></div>
                <div class="server-icon active">🥛</div>
            </div>
        </div>

        <div class="channels-sidebar">
            <div class="server-header">
                <h2>CowMilk's server</h2>
                <span class="dropdown-arrow">▼</span>
            </div>
            
            <div class="channel-list-container">
                <div class="channel-section-header">
                    <span class="category">TEXT CHANNELS</span>
                    <button class="create-channel-btn" id="createNewChannelActionBtn" title="Create Channel">+</button>
                </div>
                <div class="channel-list" id="dynamicChannelContainerRail">
                    </div>
            </div>

            <div class="user-profile-bar">
                <div class="user-info">
                    <div class="avatar-wrapper">
                        <img class="profile-avatar" id="globalUserAvatar" src="" style="display:none; object-fit: cover;">
                        <div class="profile-avatar" id="globalUserAvatarPlaceholder"></div>
                        <div class="status-bubble status-online"></div>
                    </div>
                    <div class="user-details-text">
                        <div class="username" id="globalUsername">Connecting...</div>
                        <div class="user-status" id="globalUserStatus">Syncing...</div>
                    </div>
                </div>
                <button class="admin-panel-btn" id="openAdminPanelBtn" style="display:none;" title="Admin Panel">🛡️</button>
            </div>
        </div>

        <div class="main-window">
            <header class="channel-header">
                <div class="header-left">
                    <button class="mobile-menu-btn" id="menuToggleBtn">☰</button>
                    <span class="hashtag">#</span> <span id="headerChannelName">welcome-and-rules</span>
                </div>
                <div class="header-right">
                    <input type="text" id="messageSearchInput" class="search-input" placeholder="🔍 Search messages...">
                </div>
            </header>

            <div class="inner-content">
                <div class="chat-area">
                    <div class="reply-preview-bar" id="replyPreviewBar">
                        <div class="reply-preview-details">
                            <span class="reply-arrow-curve">┌──</span> Replying to <span id="replyTargetUsername" style="font-weight: bold; color: #fff;">User</span>: 
                            <span id="replyTargetSnippet" style="font-style: italic;">Text...</span>
                        </div>
                        <button class="close-reply-btn" id="cancelReplyBtn">×</button>
                    </div>

                    <div class="chat-messages">
                        </div>

                    <div class="typing-indicator-bar" id="typingIndicatorBar"></div>

                    <div class="chat-input-container">
                        <div class="chat-input-wrapper">
                            <label class="attach-btn" for="imageAttachmentFileInput">+</label>
                            <input type="file" id="imageAttachmentFileInput" accept="image/*" style="display: none;">

                            <input type="text" id="messageInputField" placeholder="Message #welcome-and-rules">
                            
                            <div class="emoji-wrapper">
                                <button class="emoji-trigger-btn" id="emojiMenuBtn">😀</button>
                                <div class="emoji-picker-tray" id="emojiPickerTray">
                                    <span>😀</span><span>😂</span><span>🔥</span><span>👀</span><span>💯</span>
                                    <span>🥛</span><span>🤖</span><span>👑</span><span>👍</span><span>🎉</span>
                                    <span>😭</span><span>💀</span><span>😡</span><span>💖</span><span>✨</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="members-sidebar">
                    <div id="membersContainerList">
                        </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
