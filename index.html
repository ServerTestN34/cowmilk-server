<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CowMilk's Server Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="identity-modal" id="identityModal">
        <div class="modal-card">
            <h2>Select Your Profile</h2>
            <p>Choose an identity to log into CowMilk's server:</p>
            <div class="profile-options">
                <div class="profile-select-btn" data-user="Cowmilk" data-avatar="#5865f2" data-game="🎮 ROBLOX">
                    <div class="sel-avatar" style="background-color: #5865f2;"></div>
                    <span>Cowmilk</span>
                </div>
                <div class="profile-select-btn" data-user="Guest Racer" data-avatar="#e67e22" data-game="🏎️ Mario Kart">
                    <div class="sel-avatar" style="background-color: #e67e22;"></div>
                    <span>Guest Racer</span>
                </div>
            </div>
        </div>
    </div>

    <div class="discord-app" id="appContainer">
        
        <div class="mobile-overlay" id="menuOverlay"></div>

        <div class="servers-sidebar">
            <div class="server-icon active">🥛</div>
        </div>

        <div class="channels-sidebar">
            <div class="server-header">
                <h2>CowMilk's server</h2>
                <span class="dropdown-arrow">▼</span>
            </div>
            
            <div class="channel-list">
                <div class="category">INFORMATION</div>
                <div class="channel active"># welcome-and-rules</div>
                <div class="channel"># announcements</div>
                <div class="channel"># resources</div>
                
                <div class="category">TEXT CHANNELS</div>
                <div class="channel"># memes</div>
                <div class="channel"># general-chat</div>
                <div class="channel"># ai-bot-test</div>
            </div>

            <div class="user-profile-bar">
                <div class="user-info">
                    <div class="profile-avatar" id="globalUserAvatar"></div>
                    <div>
                        <div class="username" id="globalUsername">Loading...</div>
                        <div class="user-status" id="globalUserStatus">Connecting...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-window">
            
            <header class="channel-header">
                <div class="header-left">
                    <button class="mobile-menu-btn" id="menuToggleBtn">☰</button>
                    <span class="hashtag">#</span> <span id="headerChannelName">welcome-and-rules</span>
                </div>
            </header>

            <div class="inner-content">
                
                <div class="chat-area">
                    <div class="chat-messages">
                        </div>

                    <div class="chat-input-container">
                        <div class="chat-input-wrapper">
                            <input type="text" id="messageInputField" placeholder="Message #welcome-and-rules">
                            
                            <div class="emoji-wrapper">
                                <button class="emoji-trigger-btn" id="emojiMenuBtn">😀</button>
                                <div class="emoji-picker-tray" id="emojiPickerTray">
                                    <span>😀</span><span>😂</span><span>🔥</span><span>👀</span><span>💯</span>
                                    <span>🥛</span><span>🤖</span><span>👑</span><span>👍</span><span>🎉</span>
                                    <span>🚀</span><span>🎮</span><span>💀</span><span>💖</span><span>✨</span>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>

                <div class="members-sidebar">
                    <div class="member-group-title">ONLINE — <span id="onlineCount">3</span></div>
                    <div class="member-list-container" id="memberListGrid">
                        </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script src="script.js"></script>
</body>
</html>
